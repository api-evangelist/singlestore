  - type: NaftikoCapability
    url: capabilities/data-health.yaml
  - type: NaftikoCapability
    url: capabilities/data-queries.yaml
- aid: singlestore:management-api
  name: SingleStore Management API
  description: The SingleStore Management API is a REST interface for programmatically creating and managing workspace groups
    and workspaces within SingleStore Helios. It supports provisioning, updating, suspending, resuming, and deleting workspaces,
    as well as managing private connections, regions, organizations, jobs, files, secrets, and teams.
  humanURL: https://docs.singlestore.com/cloud/reference/management-api/
  baseURL: https://api.singlestore.com/v1
