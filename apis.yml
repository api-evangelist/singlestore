aid: singlestore
name: SingleStore
description: SingleStore is a cloud-native distributed SQL database designed for real-time analytics and mixed workloads.
  It offers a management API for provisioning and managing cloud workspaces, and a data API for executing SQL statements over
  HTTP without requiring native database drivers. SingleStore Helios is the fully managed cloud service providing serverless
  database capabilities with elastic scaling.
