apis:
- aid: singlestore:data-api
  name: SingleStore Data API
  description: The SingleStore Data API enables developers to execute SQL statements against a SingleStore Helios database
    over standard HTTP connections without requiring a native database driver or MySQL-compatible client. It supports all
    SQL statements via /api/v2/exec, and returns query result sets via /api/v2/query/rows and /api/v2/query/tuples. Authentication
    is handled using HTTP Basic or Bearer Authentication over HTTPS.
  humanURL: https://docs.singlestore.com/cloud/reference/data-api/
  baseURL: https://{workspaceHost}
  tags:
  - SQL
  - Database
  - Query
  - HTTP SQL
  properties:
