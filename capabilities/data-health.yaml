naftiko: 1.0.0-alpha2
info:
  label: SingleStore Data API — Health
  description: 'SingleStore Data API — Health. 1 operations. Lead operation: Ping the Data Api. Self-contained Naftiko capability
    covering one Singlestore business surface.'
  tags:
  - Singlestore
  - Health
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINGLESTORE_API_KEY: SINGLESTORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-health
    baseUri: https://{workspaceHost}
    description: SingleStore Data API — Health business capability. Self-contained, no shared references.
    resources:
    - name: api-v2-ping
      path: /api/v2/ping
      operations:
      - name: ping
        method: GET
        description: Ping the Data Api
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SINGLESTORE_API_KEY}}'
  exposes:
  - type: rest
    namespace: data-health-rest
    port: 8080
    description: REST adapter for SingleStore Data API — Health. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/v2/ping
      name: api-v2-ping
      description: REST surface for api-v2-ping.
      operations:
      - method: GET
        name: ping
        description: Ping the Data Api
        call: data-health.ping
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-health-mcp
    port: 9090
    transport: http
    description: MCP adapter for SingleStore Data API — Health. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: ping-data-api
      description: Ping the Data Api
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-health.ping
      outputParameters:
      - type: object
        mapping: $.
