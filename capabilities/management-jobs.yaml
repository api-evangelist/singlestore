naftiko: 1.0.0-alpha2
info:
  label: SingleStore Management API — Jobs
  description: 'SingleStore Management API — Jobs. 5 operations. Lead operation: List Jobs. Self-contained Naftiko capability
    covering one Singlestore business surface.'
  tags:
  - Singlestore
  - Jobs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINGLESTORE_API_KEY: SINGLESTORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-jobs
    baseUri: https://api.singlestore.com/v1
    description: SingleStore Management API — Jobs business capability. Self-contained, no shared references.
    resources:
    - name: jobs
      path: /jobs
      operations:
      - name: listjobs
        method: GET
        description: List Jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createjob
        method: POST
        description: Create a Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: jobs-jobID
      path: /jobs/{jobID}
      operations:
      - name: getjob
        method: GET
        description: Get a Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletejob
        method: DELETE
        description: Delete a Job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jobs-jobID-executions
      path: /jobs/{jobID}/executions
      operations:
      - name: listjobexecutions
        method: GET
        description: List Job Executions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: start
          in: query
          type: integer
          description: The starting execution number for pagination.
        - name: end
          in: query
          type: integer
          description: The ending execution number for pagination.
    authentication:
      type: bearer
      token: '{{env.SINGLESTORE_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-jobs-rest
    port: 8080
    description: REST adapter for SingleStore Management API — Jobs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/jobs
      name: jobs
      description: REST surface for jobs.
      operations:
      - method: GET
        name: listjobs
        description: List Jobs
        call: management-jobs.listjobs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createjob
        description: Create a Job
        call: management-jobs.createjob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}
      name: jobs-jobid
      description: REST surface for jobs-jobID.
      operations:
      - method: GET
        name: getjob
        description: Get a Job
        call: management-jobs.getjob
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletejob
        description: Delete a Job
        call: management-jobs.deletejob
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jobs/{jobid}/executions
      name: jobs-jobid-executions
      description: REST surface for jobs-jobID-executions.
      operations:
      - method: GET
        name: listjobexecutions
        description: List Job Executions
        call: management-jobs.listjobexecutions
        with:
          start: rest.start
          end: rest.end
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-jobs-mcp
    port: 9090
    transport: http
    description: MCP adapter for SingleStore Management API — Jobs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-jobs
      description: List Jobs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-jobs.listjobs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-job
      description: Create a Job
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-jobs.createjob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-job
      description: Get a Job
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-jobs.getjob
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-job
      description: Delete a Job
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: management-jobs.deletejob
      outputParameters:
      - type: object
        mapping: $.
    - name: list-job-executions
      description: List Job Executions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-jobs.listjobexecutions
      with:
        start: tools.start
        end: tools.end
      outputParameters:
      - type: object
        mapping: $.
