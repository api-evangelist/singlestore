naftiko: 1.0.0-alpha2
info:
  label: SingleStore Management API — Secrets
  description: 'SingleStore Management API — Secrets. 1 operations. Lead operation: List Secrets. Self-contained Naftiko capability
    covering one Singlestore business surface.'
  tags:
  - Singlestore
  - Secrets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINGLESTORE_API_KEY: SINGLESTORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-secrets
    baseUri: https://api.singlestore.com/v1
    description: SingleStore Management API — Secrets business capability. Self-contained, no shared references.
    resources:
    - name: secrets
      path: /secrets
      operations:
      - name: listsecrets
        method: GET
        description: List Secrets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: query
          type: string
          description: Filter secrets by exact name match.
    authentication:
      type: bearer
      token: '{{env.SINGLESTORE_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-secrets-rest
    port: 8080
    description: REST adapter for SingleStore Management API — Secrets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/secrets
      name: secrets
      description: REST surface for secrets.
      operations:
      - method: GET
        name: listsecrets
        description: List Secrets
        call: management-secrets.listsecrets
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-secrets-mcp
    port: 9090
    transport: http
    description: MCP adapter for SingleStore Management API — Secrets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-secrets
      description: List Secrets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-secrets.listsecrets
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
