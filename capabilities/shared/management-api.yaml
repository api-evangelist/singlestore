naftiko: "1.0.0-alpha1"

info:
  label: "SingleStore Management API"
  description: >-
    The SingleStore Management API provides programmatic control over SingleStore
    Helios workspace groups, workspaces, jobs, files, secrets, and organization
    settings. Used for infrastructure automation and DevOps workflows.
  tags:
    - Management
    - Workspaces
    - Provisioning
    - Database
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SINGLESTORE_MANAGEMENT_API_KEY: SINGLESTORE_MANAGEMENT_API_KEY

capability:
  consumes:
    - type: http
      namespace: singlestore-mgmt
      baseUri: https://api.singlestore.com/v1
      description: "SingleStore Management API for workspace and infrastructure management"
      authentication:
        type: bearer
        token: "{{SINGLESTORE_MANAGEMENT_API_KEY}}"
      resources:
        - name: workspace-groups
          path: /workspaceGroups
          description: Manage workspace groups
          operations:
            - name: list-workspace-groups
              method: GET
              description: List all workspace groups
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-workspace-group
              method: POST
              description: Create a new workspace group
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  regionID: "{{tools.regionID}}"
                  adminPassword: "{{tools.adminPassword}}"

        - name: workspace-group
          path: /workspaceGroups/{workspaceGroupID}
          description: Manage a specific workspace group
          operations:
            - name: get-workspace-group
              method: GET
              description: Get a workspace group
              inputParameters:
                - name: workspaceGroupID
                  in: path
                  type: string
                  required: true
                  description: The workspace group identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: terminate-workspace-group
              method: DELETE
              description: Terminate a workspace group
              inputParameters:
                - name: workspaceGroupID
                  in: path
                  type: string
                  required: true
                  description: The workspace group identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: workspaces
          path: /workspaces
          description: Manage workspaces within workspace groups
          operations:
            - name: list-workspaces
              method: GET
              description: List workspaces
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-workspace
              method: POST
              description: Create a new workspace
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  workspaceGroupID: "{{tools.workspaceGroupID}}"
                  size: "{{tools.size}}"

        - name: workspace
          path: /workspaces/{workspaceID}
          description: Manage a specific workspace
          operations:
            - name: get-workspace
              method: GET
              description: Get a workspace
              inputParameters:
                - name: workspaceID
                  in: path
                  type: string
                  required: true
                  description: The workspace identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: suspend-workspace
              method: PATCH
              description: Suspend a workspace to stop billing
              inputParameters:
                - name: workspaceID
                  in: path
                  type: string
                  required: true
                  description: The workspace identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  suspended: true
            - name: resume-workspace
              method: PATCH
              description: Resume a suspended workspace
              inputParameters:
                - name: workspaceID
                  in: path
                  type: string
                  required: true
                  description: The workspace identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  suspended: false
            - name: terminate-workspace
              method: DELETE
              description: Terminate and delete a workspace
              inputParameters:
                - name: workspaceID
                  in: path
                  type: string
                  required: true
                  description: The workspace identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: regions
          path: /regions
          description: List available deployment regions
          operations:
            - name: list-regions
              method: GET
              description: List available regions for workspace deployment
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: jobs
          path: /jobs
          description: Manage scheduled notebook jobs
          operations:
            - name: list-jobs
              method: GET
              description: List scheduled jobs
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-job
              method: POST
              description: Create a new scheduled job
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  notebookPath: "{{tools.notebookPath}}"

  exposes:
    - type: rest
      port: 8102
      namespace: singlestore-mgmt-rest
      resources:
        - path: /v1/workspace-groups
          name: workspace-groups
          description: Manage workspace groups
          operations:
            - method: GET
              name: list-workspace-groups
              description: List all workspace groups
              call: "singlestore-mgmt.list-workspace-groups"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-workspace-group
              description: Create a workspace group
              call: "singlestore-mgmt.create-workspace-group"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/workspaces
          name: workspaces
          description: Manage workspaces
          operations:
            - method: GET
              name: list-workspaces
              description: List all workspaces
              call: "singlestore-mgmt.list-workspaces"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-workspace
              description: Create a workspace
              call: "singlestore-mgmt.create-workspace"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/regions
          name: regions
          description: List deployment regions
          operations:
            - method: GET
              name: list-regions
              description: List available regions
              call: "singlestore-mgmt.list-regions"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: singlestore-mgmt-mcp
      transport: http
      tools:
        - name: list-workspace-groups
          description: List all SingleStore workspace groups in the organization
          hints:
            readOnly: true
            openWorld: false
          call: "singlestore-mgmt.list-workspace-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-workspace-group
          description: Create a new SingleStore workspace group in a specified region
          hints:
            readOnly: false
            destructive: false
          call: "singlestore-mgmt.create-workspace-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-workspaces
          description: List all workspaces across workspace groups
          hints:
            readOnly: true
            openWorld: false
          call: "singlestore-mgmt.list-workspaces"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-workspace
          description: Create a new SingleStore workspace within a workspace group
          hints:
            readOnly: false
            destructive: false
          call: "singlestore-mgmt.create-workspace"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-workspace
          description: Get details about a specific workspace
          hints:
            readOnly: true
            openWorld: false
          call: "singlestore-mgmt.get-workspace"
          with:
            workspaceID: "tools.workspaceID"
          outputParameters:
            - type: object
              mapping: "$."
        - name: suspend-workspace
          description: Suspend a running workspace to reduce costs when not in use
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "singlestore-mgmt.suspend-workspace"
          with:
            workspaceID: "tools.workspaceID"
          outputParameters:
            - type: object
              mapping: "$."
        - name: resume-workspace
          description: Resume a suspended workspace
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "singlestore-mgmt.resume-workspace"
          with:
            workspaceID: "tools.workspaceID"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-regions
          description: List available regions for deploying SingleStore workspaces
          hints:
            readOnly: true
            openWorld: false
          call: "singlestore-mgmt.list-regions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-jobs
          description: List scheduled notebook jobs
          hints:
            readOnly: true
            openWorld: false
          call: "singlestore-mgmt.list-jobs"
          outputParameters:
            - type: object
              mapping: "$."
