naftiko: 1.0.0-alpha2
info:
  label: SingleStore Management API — Regions
  description: 'SingleStore Management API — Regions. 2 operations. Lead operation: List Regions. Self-contained Naftiko capability
    covering one Singlestore business surface.'
  tags:
  - Singlestore
  - Regions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SINGLESTORE_API_KEY: SINGLESTORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-regions
    baseUri: https://api.singlestore.com/v1
    description: SingleStore Management API — Regions business capability. Self-contained, no shared references.
    resources:
    - name: regions
      path: /regions
      operations:
      - name: listregions
        method: GET
        description: List Regions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: regions-sharedtier
      path: /regions/sharedtier
      operations:
      - name: listsharedtierregions
        method: GET
        description: List Shared Tier Regions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SINGLESTORE_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-regions-rest
    port: 8080
    description: REST adapter for SingleStore Management API — Regions. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/regions
      name: regions
      description: REST surface for regions.
      operations:
      - method: GET
        name: listregions
        description: List Regions
        call: management-regions.listregions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/regions/sharedtier
      name: regions-sharedtier
      description: REST surface for regions-sharedtier.
      operations:
      - method: GET
        name: listsharedtierregions
        description: List Shared Tier Regions
        call: management-regions.listsharedtierregions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-regions-mcp
    port: 9090
    transport: http
    description: MCP adapter for SingleStore Management API — Regions. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-regions
      description: List Regions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-regions.listregions
      outputParameters:
      - type: object
        mapping: $.
    - name: list-shared-tier-regions
      description: List Shared Tier Regions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: management-regions.listsharedtierregions
      outputParameters:
      - type: object
        mapping: $.
